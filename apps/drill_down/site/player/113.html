<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale Travis - D1 Softball League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #0d6efd;
            margin-bottom: 4px;
        }
        .stat-label {
            font-size: 0.9em;
            color: #6c757d;
            text-transform: uppercase;
        }
        .table-container {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        .table th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }
        .season-link {
            color: #0d6efd;
            text-decoration: none;
        }
        .season-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container my-4">
        <nav class="mb-4">
            <a href="../index.html">Home</a> |
            <a href="../players.html">← Back to Players List</a>
        </nav>
        
        <div class="header">
            <h1>Dale Travis</h1>
            <p>Career Statistics</p>
        </div>

        <div id="playerContent">
            <p>Loading player data...</p>
        </div>
    </div>

    <script src="../js/app.js?v=20250708"></script>
    <script>
        // Load data and render player detail
        document.addEventListener('DOMContentLoaded', function() {
            loadData().then(function() {
                const playerId = 113;
                const player = playersData.find(p => p.id === playerId);
                if (player) {
                    renderPlayerDetail(playerId);
                }
            });
        });
    </script>
</body>
</html>
