<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fall 2022 - D1 Softball League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .division-section {
            margin-bottom: 30px;
        }
        .division-title {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 8px 8px 0 0;
            border: 1px solid #dee2e6;
            border-bottom: none;
            font-weight: bold;
        }
        .table-container {
            border: 1px solid #dee2e6;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
        }
        .table th {
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }
        .team-link {
            color: #0d6efd;
            text-decoration: none;
        }
        .team-link:hover {
            text-decoration: underline;
        }
        .note-box {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container my-4">
        <nav class="mb-4">
            <a href="../index.html">Home</a> |
            <a href="../seasons.html">← Back to Seasons List</a>
        </nav>
        
        <div class="header">
            <h1>Fall 2022</h1>
        </div>

        <div id="seasonContent">
            <p>Loading season data...</p>
        </div>
    </div>

    <script src="../js/app.js?v=20250708"></script>
    <script>
        // Load data and render season detail
        document.addEventListener('DOMContentLoaded', function() {
            loadData().then(function() {
                const seasonCode = 'F22';
                renderSeasonDetail(seasonCode);
            });
        });
    </script>
</body>
</html>
